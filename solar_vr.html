<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ηλιακό Σύστημα VR</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/n5ro/aframe-extras@7.5.0/dist/aframe-extras.min.js"></script>
  <script>
    // Απλό starfield με THREE.Points (ελαφρύ, ~1500 σημεία)
    AFRAME.registerComponent('starfield', {
      schema: { count: {default: 1500}, rMin: {default: 40}, rMax: {default: 90} },
      init: function () {
        const N = this.data.count, pos = new Float32Array(N * 3);
        for (let i = 0; i < N; i++) {
          const r = this.data.rMin + Math.random() * (this.data.rMax - this.data.rMin);
          const t = Math.random() * Math.PI * 2, p = Math.acos(2 * Math.random() - 1);
          pos[i*3]   = r * Math.sin(p) * Math.cos(t);
          pos[i*3+1] = r * Math.cos(p);
          pos[i*3+2] = r * Math.sin(p) * Math.sin(t);
        }
        const g = new THREE.BufferGeometry();
        g.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        const m = new THREE.PointsMaterial({ color: 0xffffff, size: 0.35, sizeAttenuation: true });
        this.el.setObject3D('stars', new THREE.Points(g, m));
      }
    });
  </script>
</head>
<body>
  <a-scene background="color: #000" renderer="colorManagement: true; exposure: 1.1"
           vr-mode-ui="enabled: true">

    <a-assets>
      <a-asset-item id="solarGLB" src="solar_system.glb"></a-asset-item>
    </a-assets>

    <!-- Αστέρια -->
    <a-entity starfield></a-entity>

    <!-- Ηλιακό σύστημα: το animation παίζει αυτόματα και κάνει loop -->
    <a-entity id="solar"
              gltf-model="#solarGLB"
              animation-mixer="clip: *; loop: repeat"
              position="0 1.4 -1.7"
              scale="0.09 0.09 0.09"></a-entity>

    <!-- Φως: point στο κέντρο (ο Ήλιος) + λίγο ambient για τις σκοτεινές πλευρές -->
    <a-light type="point" position="0 1.4 -1.7" intensity="1.3" distance="0" color="#fff5e0"></a-light>
    <a-light type="ambient" intensity="0.35" color="#8899bb"></a-light>

    <!-- Τίτλος που κοιτάει τον χρήστη -->
    <a-entity position="0 2.5 -1.7" text="value: Ηλιακό Σύστημα; align: center; width: 4; color: #ffffff"></a-entity>

    <!-- Rig: κίνηση με μοχλό (thumbstick) + χειριστήρια -->
    <a-entity id="rig" movement-controls="fly: false; speed: 0.18">
      <a-entity camera position="0 1.6 0" look-controls="pointerLockEnabled: true"></a-entity>
      <a-entity laser-controls="hand: right"></a-entity>
      <a-entity laser-controls="hand: left"></a-entity>
    </a-entity>

  </a-scene>
</body>
</html>
